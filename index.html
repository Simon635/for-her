<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>For Kira</title>

	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap"
		rel="stylesheet">
	<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
		<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
			<circle cx='50' cy='50' r='48' fill='black'/>
			<text x='50' y='56'
						text-anchor='middle'
						dominant-baseline='middle'
						font-size='54'
						fill='%23c9a75c'
						font-family='Arial, sans-serif'>♪</text>
		</svg>">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		/* ================= INTRO ================= */
		.intro {
			position: fixed;
			inset: 0;
			background: #070605;
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 999;
			animation: introFade 3s ease forwards;
		}

		.intro h1 {
			font-family: 'Cormorant Garamond', serif;
			font-size: 58px;
			font-weight: 300;
			color: #d4af6e;
			letter-spacing: 6px;
			opacity: 0;
			transform: scale(1.2);
			animation: fadeIn 1.2s ease forwards;
		}

		@keyframes fadeIn {
			to {
				opacity: 1;
				transform: scale(1);
			}
		}

		@keyframes introFade {
			0% {
				opacity: 1;
			}

			70% {
				opacity: 1;
			}

			100% {
				opacity: 0;
				visibility: hidden;
			}
		}

		/* ================= MAIN THEME ================= */

		body {
			min-height: 100vh;
			font-family: 'Inter', sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 30px;
			overflow-x: hidden;
			overflow-y: auto;

			color: #f5f1e8;

			background:
				radial-gradient(circle at top, rgba(212, 175, 110, 0.10), transparent 45%),
				radial-gradient(circle at bottom, rgba(60, 40, 30, 0.6), transparent 60%),
				#0b0a08;
		}

		/* мягкий свет */
		body::before {
			content: "";
			position: fixed;
			inset: -40%;
			background: radial-gradient(circle, rgba(212, 175, 110, 0.12), transparent 60%);
			animation: glow 10s ease-in-out infinite;
			pointer-events: none;
		}

		@keyframes glow {

			0%,
			100% {
				transform: translate(-5%, -5%);
				opacity: 0.4;
			}

			50% {
				transform: translate(5%, 5%);
				opacity: 0.7;
			}
		}

		/* ================= MAIN ENTRY ================= */

		.main {
			opacity: 0;
			transform: scale(1.05);
			filter: blur(10px);
			animation: open 1.4s ease forwards;
			animation-delay: 2.8s;
		}

		@keyframes open {
			to {
				opacity: 1;
				transform: scale(1);
				filter: blur(0);
			}
		}

		.container {
			width: 100%;
			max-width: 420px;
			text-align: center;
		}

		/* ================= REVEAL ================= */

		.logo,
		.subtitle,
		h1,
		.text,
		.player,
		.footer {
			opacity: 0;
			transform: translateY(20px);
			animation: reveal 1s ease forwards;
		}

		.logo {
			animation-delay: 3.2s;
		}

		.subtitle {
			animation-delay: 3.4s;
		}

		h1 {
			animation-delay: 3.6s;
		}

		.text {
			animation-delay: 3.8s;
		}

		.player {
			animation-delay: 4.0s;
		}

		.footer {
			animation-delay: 4.2s;
		}

		@keyframes reveal {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		/* ================= UI ================= */

		.logo {
			width: 74px;
			height: 74px;
			margin: 0 auto 40px;
			border-radius: 50%;
			border: 1px solid rgba(212, 175, 110, 0.4);
			background: rgba(255, 255, 255, 0.02);

			display: flex;
			align-items: center;
			justify-content: center;

			color: #d4af6e;
			font-size: 28px;

			backdrop-filter: blur(12px);
		}

		.subtitle {
			color: #d4af6e;
			letter-spacing: 5px;
			font-size: 11px;
			margin-bottom: 18px;
			text-transform: uppercase;
		}

		h1 {
			font-family: 'Cormorant Garamond', serif;
			font-size: 56px;
			font-weight: 300;
			line-height: 1;
			margin-bottom: 25px;
		}

		.text {
			margin: 0 auto;
			max-width: 300px;
			color: rgba(245, 241, 232, 0.75);
			line-height: 1.9;
			font-size: 15px;
			margin-bottom: 40px;
		}

		/* ================= PLAYER ================= */

		.player {
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(212, 175, 110, 0.25);
			border-radius: 26px;
			padding: 30px;

			backdrop-filter: blur(20px);

			box-shadow:
				0 20px 60px rgba(0, 0, 0, 0.6),
				inset 0 1px 1px rgba(255, 255, 255, 0.05);
		}

		.song-title {
			font-family: 'Cormorant Garamond', serif;
			font-size: 30px;
			margin-bottom: 10px;
			color: #e7d3a3;
		}

		.song-desc {
			color: rgba(245, 241, 232, 0.6);
			font-size: 13px;
			line-height: 1.6;
			margin-bottom: 20px;
		}

		audio {
			width: 100%;
			filter: sepia(1) saturate(0.6) brightness(0.9);
		}

		/* ================= FOOTER ================= */

		.footer {
			margin-top: 45px;
			color: rgba(212, 175, 110, 0.35);
			font-size: 12px;
			letter-spacing: 4px;
		}
	</style>
</head>

<body>

	<!-- INTRO -->
	<div class="intro">
		<h1>For Kira</h1>
	</div>

	<!-- MAIN -->
	<div class="main">

		<div class="container">

			<div class="logo">♪</div>

			<div class="subtitle">Небольшой сюрприз</div>

			<h1>Одна<br>песня</h1>

			<div class="text">
				Я приехал ненадолго,<br>
				но захотел оставить тебе что-то,
				что останется чуть дольше моего приезда.<br><br>

				Эта песня — для тебя.
			</div>

			<div class="player">

				<div class="song-title">Для тебя</div>

				<div class="song-desc">
					Несколько минут музыки и немного того,<br>
					что проще услышать, чем сказать
				</div>

				<audio controls>
					<source src="song.mp3" type="audio/mpeg">
				</audio>

			</div>

			<div class="footer">
				Summer 2026
			</div>

		</div>

	</div>

</body>

</html>
