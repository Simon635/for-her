<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Для тебя</title>

	<link
		href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400&display=swap"
		rel="stylesheet">

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			background:
				radial-gradient(circle at top, rgba(201, 167, 92, 0.12), transparent 45%),
				#090909;
			color: #f5f5f5;
			font-family: 'Inter', sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 30px;
		}

		.container {
			width: 100%;
			max-width: 420px;
			text-align: center;
			animation: fadeIn 1.5s ease;
		}

		.logo {
			width: 72px;
			height: 72px;
			border: 1px solid rgba(201, 167, 92, 0.3);
			border-radius: 50%;
			margin: 0 auto 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #c9a75c;
			font-size: 28px;
			backdrop-filter: blur(10px);
			animation: glow 4s ease-in-out infinite;
		}

		.subtitle {
			color: #c9a75c;
			letter-spacing: 5px;
			font-size: 11px;
			margin-bottom: 18px;
			text-transform: uppercase;
		}

		h1 {
			font-family: 'Cormorant Garamond', serif;
			font-size: 56px;
			font-weight: 300;
			line-height: 1;
			margin-bottom: 25px;
		}

		.text {
			color: rgba(255, 255, 255, 0.72);
			line-height: 1.9;
			font-size: 15px;
			margin-bottom: 50px;
		}

		.player {
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid rgba(201, 167, 92, 0.15);
			border-radius: 30px;
			padding: 30px;
			backdrop-filter: blur(20px);
		}

		.song-title {
			font-family: 'Cormorant Garamond', serif;
			font-size: 30px;
			margin-bottom: 10px;
		}

		.song-desc {
			color: rgba(255, 255, 255, 0.55);
			font-size: 13px;
			margin-bottom: 25px;
			line-height: 1.6;
		}

		audio {
			width: 100%;
			height: 42px;
			filter: sepia(1) saturate(0.4) brightness(0.95);
		}

		.footer {
			margin-top: 45px;
			color: rgba(255, 255, 255, 0.3);
			font-size: 12px;
			letter-spacing: 4px;
		}

		@keyframes glow {
			50% {
				box-shadow: 0 0 30px rgba(201, 167, 92, 0.15);
			}
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(20px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>

<body>

	<div class="container">

		<div class="logo">♪</div>

		<div class="subtitle">Небольшой сюрприз</div>

		<h1>Одна<br>песня</h1>

		<div class="text">

			Я приехал ненадолго,<br>
			но захотел оставить тебе что-то,
			что останется чуть дольше моего приезда.<br><br>
			Эта песня — для тебя.

		</div>

		<div class="player">

			<div class="song-title">
				Для тебя
			</div>

			<div class="song-desc">
				Несколько мыслей, которые лучше звучат в музыке
			</div>

			<!-- СЮДА ДОБАВЬ СВОЙ ФАЙЛ -->
			<!-- Положи song.mp3 рядом с этим HTML -->
			<audio controls>
				<source src="song.mp3" type="audio/mpeg">
				Ваш браузер не поддерживает аудио.
			</audio>

		</div>

		<div class="footer">
			ИЮНЬ 2026
		</div>

	</div>

</body>

</html>
